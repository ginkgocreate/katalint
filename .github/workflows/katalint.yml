name: katalint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  katalint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q
      - run: python -m build
      - run: katalint check
