name: katalint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  katalint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q
      - run: katalint check
      - run: python -m build
      - name: Smoke installed wheel
        run: |
          python -m pip install --force-reinstall dist/katalint-*.whl
          katalint --version
          katalint explain KTL001
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          katalint check --format json
          cd "$GITHUB_WORKSPACE"
          rm -r "$tmpdir"
